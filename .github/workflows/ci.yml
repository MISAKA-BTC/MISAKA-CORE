name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  # Rustc strict: warnings-as-errors for NEW lint categories.
  # Noisy test-only lints (unused_imports, unused_variables, dead_code,
  # unused_must_use, unused_mut) are allowed during the 0.9.0 refactor
  # window. The Clippy job below still enforces its own `-D warnings`
  # with the full clippy lint set for real code-quality issues.
  RUSTFLAGS: "-D warnings -A unused_imports -A unused_variables -A dead_code -A unused_must_use -A unused_mut"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --features "testnet,dag,json-store-dev"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --features "testnet,dag,json-store-dev"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Clippy severity comes from [workspace.lints.clippy] in Cargo.toml.
      # Passing -D warnings on the CLI overrides workspace policy and escalates
      # every newly-shipped rustc/clippy nit to a build-breaking error. Rust 1.95
      # added ~30 new deny-by-default lints (needless_borrows_for_generic_args,
      # field_reassign_with_default, unnecessary_map_or, needless_range_loop, etc.)
      # which are cosmetic, not correctness. Drop -D warnings and rely on workspace.
      - run: cargo clippy --all-targets --features "testnet,dag,json-store-dev"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
