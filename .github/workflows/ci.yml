name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  # Rustc strict: warnings-as-errors for NEW lint categories.
  # Noisy test-only lints (unused_imports, unused_variables, dead_code,
  # unused_must_use, unused_mut) are allowed during the 0.9.0 refactor
  # window. The Clippy job below still enforces its own `-D warnings`
  # with the full clippy lint set for real code-quality issues.
  RUSTFLAGS: "-D warnings -A unused_imports -A unused_variables -A dead_code -A unused_must_use -A unused_mut"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --features "testnet,dag,json-store-dev"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --features "testnet,dag,json-store-dev"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    # Override the workflow-level `RUSTFLAGS: -D warnings …` for the
    # Clippy job specifically. The workflow-wide `-D warnings` is
    # appropriate for Check / Test (compile errors only) but overwhelms
    # Clippy with every new deny-by-default lint Rust 1.95+ ships
    # (needless_borrows_for_generic_args, field_reassign_with_default,
    # unnecessary_map_or, needless_range_loop, expect_used, etc.). The
    # workspace-level `[workspace.lints.clippy]` in Cargo.toml is the
    # authoritative policy for clippy severity; cargo clippy's
    # non-`-D warnings` invocation respects it and reports, but does
    # not block, stylistic nits.
    env:
      RUSTFLAGS: "-A unused_imports -A unused_variables -A dead_code -A unused_must_use -A unused_mut"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features "testnet,dag,json-store-dev"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
