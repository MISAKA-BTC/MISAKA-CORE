# MISAKA Bridge Relayer — Multi-instance Docker Compose
#
# Both relayers share the same processed-message store via volume.
# Idempotency keys ensure no duplicate submissions even with concurrent execution.
#
# Usage:
#   docker-compose up -d           # Start 2 relayers
#   docker-compose logs -f         # Watch logs
#   docker-compose down            # Stop

version: "3.8"

services:
  relayer-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misaka-relayer-1
    restart: unless-stopped
    environment:
      - SOLANA_RPC_URL=https://api.devnet.solana.com
      - MISAKA_RPC_URL=http://host.docker.internal:3001
      - BRIDGE_PROGRAM_ID=MBRDGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - RELAYER_KEYPAIR=/keys/relayer.json
      - POLL_INTERVAL=15
      - PROCESSED_STORE=/data/relayer-processed.json
      - RUST_LOG=info
    volumes:
      - relayer-data:/data
      - ./keys:/keys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  relayer-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misaka-relayer-2
    restart: unless-stopped
    environment:
      - SOLANA_RPC_URL=https://api.devnet.solana.com
      - MISAKA_RPC_URL=http://host.docker.internal:3001
      - BRIDGE_PROGRAM_ID=MBRDGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - RELAYER_KEYPAIR=/keys/relayer.json
      - POLL_INTERVAL=20   # offset to reduce collision
      - PROCESSED_STORE=/data/relayer-processed.json
      - RUST_LOG=info
    volumes:
      - relayer-data:/data
      - ./keys:/keys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  relayer-data:
    driver: local
