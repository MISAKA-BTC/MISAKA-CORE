[package]
name = "misaka-node"
description = "MISAKA Network validator node"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
# ═══ DAG Consensus (v2) ═══
# Replaces linear blockchain with GhostDAG BlockDAG.
# Build: cargo build -p misaka-node --features experimental_dag
experimental_dag = ["misaka-dag"]
# ═══ Development features ═══
# Development-only RPC endpoints (get_address_outputs — privacy leak).
# MUST NOT be enabled in mainnet/production builds.
dev-rpc = []
# Testnet faucet endpoint. MUST NOT be enabled in production.
faucet = []
# Development bridge mock verifier. MUST NOT be enabled in production.
dev-bridge-mock = []
# General dev feature — compile_error! in release builds prevents shipping.
dev = ["dev-rpc", "faucet", "dev-bridge-mock"]

[dependencies]
misaka-types = { path = "../misaka-types" }
misaka-crypto = { path = "../misaka-crypto" }
misaka-pqc = { path = "../misaka-pqc" }
misaka-execution = { path = "../misaka-execution" }
misaka-storage = { path = "../misaka-storage" }
misaka-mempool = { path = "../misaka-mempool" }
misaka-consensus = { path = "../misaka-consensus" }
misaka-p2p = { path = "../misaka-p2p" }
misaka-tokenomics = { path = "../misaka-tokenomics" }
misaka-rpc = { path = "../misaka-rpc" }
# DAG crate — only compiled when experimental_dag feature is enabled
misaka-dag = { path = "../misaka-dag", optional = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha3 = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
tower = { workspace = true }

[lints]
workspace = true
