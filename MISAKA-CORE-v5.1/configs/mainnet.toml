# MISAKA Network — Mainnet Configuration
# chain_id = 1, LogRing-v1 default, faucet DISABLED, bridge DISABLED
#
# IMPORTANT: This config enforces production safety constraints.
# Do NOT modify without consensus from all validator operators.

[chain]
chain_id = 1
chain_name = "MISAKA Mainnet"

[node]
mode = "public"
data_dir = "./misaka-data"
log_level = "info"

[p2p]
port = 6690
max_inbound_peers = 64
max_outbound_peers = 16
# MANDATORY for mainnet validators — set to your public IP:
# advertise_addr = "YOUR_PUBLIC_IP:6690"

[rpc]
port = 3001

[consensus]
block_time_secs = 60

[faucet]
# Faucet is DISABLED on mainnet. The feature flag must also be excluded
# from the build: `cargo build --release` (no --features faucet).
enabled = false

[ring_signature]
# LogRing-v1 is the SYSTEM DEFAULT ring signature scheme.
# O(log n) size — supports rings up to 1024 members.
default_scheme = "logring-v1"
min_ring_size = 4
max_ring_size = 1024

[bridge]
# Bridge is DISABLED at mainnet launch. Enable only after security audit
# of the Solana bridge program is complete and committee verifier is deployed.
enabled = false

[staking]
# Minimum stake to become a validator (in base units).
# 10,000 MISAKA = 10_000_000_000 base units (6 decimal places).
min_stake = 10_000_000_000
# Unbonding period in blocks (~7 days at 60s block time).
unbonding_period = 10080
# Maximum validators in the active set.
max_validators = 100

[security]
# Validator key encryption is MANDATORY for mainnet.
# Set MISAKA_VALIDATOR_PASSPHRASE env var before starting the node.
# Empty passphrase is rejected for chain_id = 1.
require_encrypted_keystore = true
