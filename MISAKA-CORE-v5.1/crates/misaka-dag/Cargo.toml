[package]
name = "misaka-dag"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "MISAKA-CORE v2: Privacy BlockDAG — GhostDAG consensus + LogRing anonymity"

[dependencies]
misaka-types    = { path = "../misaka-types" }
misaka-storage  = { path = "../misaka-storage" }
misaka-crypto   = { path = "../misaka-crypto" }
misaka-pqc      = { path = "../misaka-pqc", optional = true }
rocksdb         = { version = "0.22", default-features = false, features = ["snappy"], optional = true }

sha3      = { workspace = true }
thiserror = { workspace = true }
tracing   = { workspace = true }
hex       = { workspace = true }
serde     = { workspace = true }
serde_json = { workspace = true }
chrono    = { workspace = true }
tokio     = { workspace = true }
rand      = { workspace = true }

[features]
default = []
# Enable Q-DAG-CT verification (requires misaka-pqc)
qdag-ct = ["dep:misaka-pqc"]
# Enable RocksDB persistent storage (production)
rocksdb = ["dep:rocksdb"]

[dev-dependencies]
rand = { workspace = true }
misaka-pqc = { path = "../misaka-pqc", features = ["stark-stub"] }
proptest = "1"

[lints]
workspace = true
