[package]
name = "misaka-wallet-core"
description = "MISAKA Wallet SDK — key management, coin selection, TX planning"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
misaka-pqc = { path = "../../crates/misaka-pqc" }
# SEC-FIX: Required for IntentMessage-based signing digest (executor-compatible).
# Previously wallet used custom sighash:v1/v2 schemes that were incompatible
# with the executor's IntentMessage verification.
misaka-types = { path = "../../crates/misaka-types" }
serde = { workspace = true }
serde_json = { workspace = true }
sha3 = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }

# SEC-WALLET: Key encryption (Argon2id + XChaCha20-Poly1305)
chacha20poly1305 = { workspace = true }
hkdf = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
argon2 = "0.5"
rand = "0.8"
zeroize = { version = "1", features = ["derive"] }
# BLOCKER C: standards-compliant BIP-39 mnemonic (English wordlist).
# Replaces the custom "word0042" scheme flagged as MAINNET-BLOCKER.
bip39 = { workspace = true }

# Native RPC client (not available in WASM builds)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
tokio = { version = "1", features = ["rt"], optional = true }
anyhow = { version = "1", optional = true }

[features]
default = []
native-rpc = ["reqwest", "tokio", "anyhow"]

[lints]
workspace = true
