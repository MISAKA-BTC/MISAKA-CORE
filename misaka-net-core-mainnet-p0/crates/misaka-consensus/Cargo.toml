[package]
name = "misaka-consensus"
description = "Public PoS consensus with ML-DSA-65 PQ-only signatures"
version.workspace = true
edition.workspace = true
license.workspace = true
[dependencies]
misaka-storage = { path = "../misaka-storage" }
misaka-types = { path = "../misaka-types" }
misaka-crypto = { path = "../misaka-crypto" }
misaka-pqc = { path = "../misaka-pqc" }
sha3 = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
hex = { workspace = true }

[features]
default = ["strict-ki-proof"]
strict-ki-proof = []
legacy-block-fallback = []
chipmunk = ["misaka-pqc/chipmunk"]
