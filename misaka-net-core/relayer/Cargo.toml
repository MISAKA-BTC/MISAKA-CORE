[package]
name = "misaka-relayer"
version = "0.1.0"
edition = "2021"
description = "MISAKA <-> Solana bridge relayer"

[[bin]]
name = "misaka-relayer"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
hex = "0.4"
sha3 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
