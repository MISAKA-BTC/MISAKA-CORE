[package]
name = "misaka-bridge-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
misaka-bridge = { path = "..", features = ["dev-bridge-mock"] }
serde_json = "1"

[[bin]]
name = "fuzz_bridge_request"
path = "fuzz_targets/fuzz_bridge_request.rs"

[[bin]]
name = "fuzz_bridge_approval"
path = "fuzz_targets/fuzz_bridge_approval.rs"
