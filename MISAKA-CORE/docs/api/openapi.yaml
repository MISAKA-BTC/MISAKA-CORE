openapi: "3.1.0"
info:
  title: MISAKA Network Node API
  version: 0.5.0
  description: |
    Post-quantum, privacy-focused Layer 1 blockchain node RPC.

    ## Authentication
    Write endpoints (submit_tx, faucet) require `X-API-Key` header when
    `MISAKA_RPC_API_KEY` environment variable is set on the node.

    ## CORS
    Controlled by `MISAKA_CORS_ORIGINS` env var. Default: localhost + chrome-extension://.

  contact:
    name: MISAKA Network
    url: https://github.com/MISAKA-BTC/MISAKA-CORE
  license:
    name: Proprietary

servers:
  - url: http://127.0.0.1:3001
    description: Local testnet node

tags:
  - name: chain
    description: Chain & DAG information
  - name: wallet
    description: Wallet & UTXO queries
  - name: transaction
    description: Transaction submission
  - name: validator
    description: Validator set management
  - name: util
    description: Health, fees, mempool

paths:
  /health:
    get:
      tags: [util]
      summary: Node health check
      operationId: health
      responses:
        "200":
          description: Node is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }
                  consensus: { type: string, example: "ghostdag" }
                  version: { type: string, example: "v2.0.0-alpha" }

  /api/get_chain_info:
    post:
      tags: [chain]
      summary: Get chain metadata and latest block info
      operationId: getChainInfo
      responses:
        "200":
          description: Chain info
          content:
            application/json:
              schema:
                type: object
                properties:
                  chainId: { type: integer, example: 2 }
                  chainName: { type: string, example: "MISAKA Testnet" }
                  dagSize: { type: integer }
                  virtualTip: { type: string, description: "Hex-encoded 32-byte hash" }
                  virtualTipScore: { type: integer }
                  mempoolSize: { type: integer }
                  utxoSetSize: { type: integer }
                  latestCheckpoint: { $ref: "#/components/schemas/Checkpoint" }

  /api/get_dag_info:
    post:
      tags: [chain]
      summary: Get DAG statistics
      operationId: getDagInfo
      responses:
        "200":
          description: DAG stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  dagSize: { type: integer }
                  tipCount: { type: integer }
                  virtualTip: { type: string }
                  virtualTipScore: { type: integer }
                  genesisHash: { type: string }
                  k: { type: integer, example: 18 }

  /api/get_dag_tips:
    post:
      tags: [chain]
      summary: Get current DAG tips
      operationId: getDagTips
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  tips:
                    type: array
                    items: { type: string }
                  count: { type: integer }

  /api/get_dag_block:
    post:
      tags: [chain]
      summary: Get a DAG block by hash
      operationId: getDagBlock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hash]
              properties:
                hash: { type: string, description: "Hex-encoded block hash" }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DagBlock"

  /api/get_tx_by_hash:
    post:
      tags: [transaction]
      summary: Look up a transaction by hash
      operationId: getTxByHash
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hash]
              properties:
                hash: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  found: { type: boolean }
                  source: { type: string, enum: [dag, mempool] }
                  tx: { $ref: "#/components/schemas/Transaction" }

  /api/get_virtual_chain:
    post:
      tags: [chain]
      summary: Get the virtual selected-parent chain
      operationId: getVirtualChain
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: { type: integer, default: 50 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  chain:
                    type: array
                    items: { type: string }

  /api/get_virtual_state:
    post:
      tags: [chain]
      summary: Get the current virtual state snapshot
      operationId: getVirtualState
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  tip: { type: string }
                  tipScore: { type: integer }
                  nullifierCount: { type: integer }
                  utxoCount: { type: integer }
                  stateRoot: { type: string }

  /api/get_utxos_by_address:
    post:
      tags: [wallet]
      summary: Get UTXOs owned by a MISAKA address
      description: |
        Scans the UTXO set for outputs whose spending_pubkey derives to the
        given address. O(n) scan — use misaka-api indexer for production scale.

        NOTE: Stealth address outputs will NOT appear here.
        Use block scanning with a view key for stealth output detection.
      operationId: getUtxosByAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                  example: "msk1a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  address: { type: string }
                  balance: { type: integer, description: "Total balance in base units" }
                  utxoCount: { type: integer }
                  utxos:
                    type: array
                    items: { $ref: "#/components/schemas/OwnedUtxo" }

  /api/get_decoy_utxos:
    post:
      tags: [wallet]
      summary: Get same-amount decoy UTXOs for ring signature construction
      description: |
        Returns UTXOs with the same amount and their spending_pubkey.
        Used by the wallet to build ring signatures for anonymous transfers.
      operationId: getDecoyUtxos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: integer, description: "Target amount in base units" }
                count: { type: integer, default: 8, maximum: 64 }
                excludeTxHash: { type: string, description: "TX hash of UTXO being spent" }
                excludeOutputIndex: { type: integer, default: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  utxos:
                    type: array
                    items: { $ref: "#/components/schemas/DecoyUtxo" }
                  count: { type: integer }
                  requestedAmount: { type: integer }

  /api/get_anonymity_set:
    post:
      tags: [wallet]
      summary: Build a ZKP anonymity set from confirmed UTXOs
      description: |
        Returns leaf hashes for SIS Merkle tree construction.
        Used for Q-DAG-CT (--shielded) confidential transfers.
      operationId: getAnonymitySet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ringSize: { type: integer, default: 16, minimum: 4, maximum: 1024 }
                txHash: { type: string, description: "Signer's UTXO tx hash" }
                outputIndex: { type: integer, default: 0 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaves:
                    type: array
                    items: { type: string }
                  signerIndex: { type: integer }
                  ringSize: { type: integer }
                  merkleRoot: { type: string }

  /api/get_mempool_info:
    get:
      tags: [util]
      summary: Get mempool statistics
      operationId: getMempoolInfo
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  mempoolSize: { type: integer }
                  utxoSetSize: { type: integer }
                  minFee: { type: integer, example: 100 }

  /api/fee_estimate:
    get:
      tags: [util]
      summary: Estimate transaction fees at three priority levels
      operationId: feeEstimate
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  low: { type: integer, description: "Base units" }
                  medium: { type: integer }
                  high: { type: integer }
                  unit: { type: string, example: "base" }
                  mempoolSize: { type: integer }

  /api/submit_tx:
    post:
      tags: [transaction]
      summary: Submit a signed transaction
      description: |
        Accepts transparent, ring signature, or ZKP transactions.
        Requires X-API-Key header when authentication is enabled.
      operationId: submitTx
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTxRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  txHash: { type: string }
                  accepted: { type: boolean }
                  error: { type: string }
                  admissionPath: { type: string, enum: [ringSignature, zeroKnowledge, transparent] }

  /api/faucet:
    post:
      tags: [transaction]
      summary: Request testnet tokens
      description: Disabled on mainnet (chain_id=1). Rate-limited per address.
      operationId: faucet
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address: { type: string, example: "msk1..." }
                spendingPubkey: { type: string, description: "Hex-encoded spending pubkey" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted: { type: boolean }
                  txHash: { type: string }
                  amount: { type: integer }
                  address: { type: string }
                  error: { type: string }

  /api/v1/validators/:
    get:
      tags: [validator]
      summary: List all registered validators
      operationId: listValidators
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  validators:
                    type: array
                    items: { $ref: "#/components/schemas/ValidatorInfo" }

  /api/v1/validators/active:
    get:
      tags: [validator]
      summary: Get active validator set
      operationId: activeValidators
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  validators:
                    type: array
                    items: { $ref: "#/components/schemas/ValidatorInfo" }

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Set MISAKA_RPC_API_KEY on the node to enable

  schemas:
    OwnedUtxo:
      type: object
      properties:
        txHash: { type: string }
        outputIndex: { type: integer }
        amount: { type: integer }
        oneTimeAddress: { type: string }
        spendingPubkey: { type: string }
        createdAt: { type: integer }

    DecoyUtxo:
      type: object
      properties:
        txHash: { type: string }
        outputIndex: { type: integer }
        amount: { type: integer }
        spendingPubkey: { type: string }

    Transaction:
      type: object
      properties:
        version: { type: integer }
        ringScheme: { type: integer }
        txType: { type: integer, description: "0=Transfer, 1=Coinbase, 2=Faucet, 3=StakeDeposit, 4=StakeWithdraw, 5=SlashEvidence, 6=TransparentTransfer" }
        inputs:
          type: array
          items:
            type: object
            properties:
              ringMembers:
                type: array
                items:
                  type: object
                  properties:
                    txHash: { type: string }
                    outputIndex: { type: integer }
              ringSignature: { type: string, description: "Hex-encoded" }
              keyImage: { type: string, description: "Hex-encoded 32 bytes" }
              kiProof: { type: string }
        outputs:
          type: array
          items:
            type: object
            properties:
              amount: { type: integer }
              oneTimeAddress: { type: string }
        fee: { type: integer }

    SubmitTxRequest:
      type: object
      description: Signed transaction (JSON-serialized UtxoTransaction)
      properties:
        version: { type: integer, example: 1 }
        ringScheme: { type: integer, description: "0x01=LRS, 0x03=LogRing, 0x10=UnifiedZKP, 0x20=Transparent" }
        txType: { type: integer }
        inputs: { type: array, items: { type: object } }
        outputs: { type: array, items: { type: object } }
        fee: { type: integer }

    DagBlock:
      type: object
      properties:
        hash: { type: string }
        parents: { type: array, items: { type: string } }
        blueScore: { type: integer }
        timestamp: { type: integer }
        txCount: { type: integer }

    Checkpoint:
      type: object
      properties:
        blockHash: { type: string }
        blueScore: { type: integer }
        utxoRoot: { type: string }
        totalKeyImages: { type: integer }
        totalAppliedTxs: { type: integer }
        timestampMs: { type: integer }

    ValidatorInfo:
      type: object
      properties:
        validatorId: { type: string }
        stakeWeight: { type: string }
        publicKeyHex: { type: string }
        isActive: { type: boolean }
