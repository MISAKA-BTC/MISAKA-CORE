# MISAKA Network — Mainnet Configuration
# chain_id = 1, LogRing-v1 default, faucet DISABLED, bridge DISABLED
#
# IMPORTANT: This config enforces production safety constraints.
# Do NOT modify without consensus from all validator operators.

[chain]
chain_id = 1
chain_name = "MISAKA Mainnet"

[node]
mode = "public"
data_dir = "./misaka-data"
log_level = "info"

[p2p]
port = 6690
max_inbound_peers = 64
max_outbound_peers = 16
# MANDATORY for mainnet validators — set to your public IP:
# advertise_addr = "YOUR_PUBLIC_IP:6690"

# SEC-P2P-GUARD: Connection guard settings (v3)
max_handshake_attempts_per_ip = 5
max_half_open = 64
half_open_timeout_secs = 15
max_inbound_per_subnet = 4
max_inbound_per_ip = 2

# SEC-ST-LIFE: Session lifetime
# Mainnet uses 24h default. Validators SHOULD override to 14400 (4h).
max_session_lifetime_secs = 86400

# Protocol version (v3 required)
min_protocol_version = 3

[rpc]
port = 3001

[consensus]
fast_block_time_secs = 2
zkp_block_time_secs = 30

[faucet]
# Faucet is DISABLED on mainnet. The feature flag must also be excluded
# from the build: `cargo build --release` (no --features faucet).
enabled = false

[ring_signature]
# LogRing-v1 is the SYSTEM DEFAULT ring signature scheme.
# O(log n) size — supports rings up to 1024 members.
default_scheme = "logring-v1"
min_ring_size = 1  # v10: ring sigs purged
max_ring_size = 1024

[bridge]
# Bridge is DISABLED at mainnet launch. Enable only after security audit
# of the Solana bridge program is complete and committee verifier is deployed.
enabled = false

[staking]
# Minimum stake to become a validator (in base units).
# 10,000,000 MISAKA = 10_000_000_000_000_000 base units (9 decimal places).
min_stake = 10_000_000_000_000_000
# Unbonding period in blocks (~7 days at 2s block time).
unbonding_period = 302400
# Maximum validators in the active set.
max_validators = 21
# Minimum delegation amount (in base units).
# 1,000 MISAKA = 1_000_000_000_000 base units.
min_delegation = 1_000_000_000_000

[security]
# Validator key encryption is MANDATORY for mainnet.
# Set MISAKA_VALIDATOR_PASSPHRASE env var before starting the node.
# Empty passphrase is rejected for chain_id = 1.
require_encrypted_keystore = true

[weak_subjectivity]
# Weak subjectivity checkpoint — REQUIRED for new node sync.
# Obtain from multiple independent sources (block explorer, peers, official channels).
# Format: "epoch:block_hash_hex"
# Example: "10080:a1b2c3d4..."
checkpoint = ""
# Weak subjectivity period in epochs (must be <= unbonding_period).
ws_period_epochs = 10080

# ─── Shielded Module ────────────────────────────────────────────────────────
# MISAKA is a transparent DAG L1. Shielded transfers are OPTIONAL and
# must be explicitly initiated by the user (no privacy-by-default).
#
# For exchange / CEX operator nodes:
#   Set enabled = false to operate in transparent-only mode.
#   This rejects all shielded transactions and disables /api/shielded/* routes.
#
# For general validator nodes:
#   Leave enabled = true. Transparent transfers remain the default route.

[shielded]
enabled = true
mempool_proof_verify = false
max_anchor_age_blocks = 100
min_shielded_fee = 1000
# MUST be false on mainnet (P0 stub proofs are testnet-only)
testnet_mode = false
