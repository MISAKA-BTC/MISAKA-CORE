# docker/explorer/nginx.conf
# Example nginx config for misakascan.com
# Use with the nginx service in docker-compose.yml or on the host

server {
    listen 80;
    server_name misakascan.com www.misakascan.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name misakascan.com www.misakascan.com;

    ssl_certificate /etc/letsencrypt/live/misakascan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/misakascan.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
