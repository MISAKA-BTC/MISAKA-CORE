# docker/node/docker-compose.yml
# Usage:
#   docker compose up seed          # Seed node
#   docker compose up public        # Public full node
#   docker compose up validator     # Validator node
#   docker compose up seed public   # Seed + Public together

services:
  # ─── Seed Node ──────────────────────────────────────────
  seed:
    build:
      context: ../../          # misaka-net-core root
      dockerfile: docker/node/Dockerfile
    container_name: misaka-seed
    restart: unless-stopped
    ports:
      - "6690:6690"
      - "3001:3001"
    volumes:
      - ./config:/config:ro
      - seed-data:/home/misaka/data
    environment:
      - MISAKA_NODE_NAME=seed-01
      - MISAKA_NODE_DATA_DIR=/home/misaka/data
      - MISAKA_NODE_ADVERTISE_ADDR=${ADVERTISE_ADDR:-}
      - MISAKA_NODE_SEEDS=${SEED_ADDRS:-}
    command: ["--config", "/config/seed-node.toml"]

  # ─── Public Full Node ──────────────────────────────────
  public:
    build:
      context: ../../
      dockerfile: docker/node/Dockerfile
    container_name: misaka-public
    restart: unless-stopped
    ports:
      - "6691:6690"
      - "3002:3001"
    volumes:
      - ./config:/config:ro
      - public-data:/home/misaka/data
    environment:
      - MISAKA_NODE_NAME=public-01
      - MISAKA_NODE_DATA_DIR=/home/misaka/data
      - MISAKA_NODE_ADVERTISE_ADDR=${PUBLIC_ADVERTISE_ADDR:-}
      - MISAKA_NODE_SEEDS=${SEED_ADDRS:-49.212.136.189:6690}
    command: ["--config", "/config/public-node.toml"]

  # ─── Validator Node ────────────────────────────────────
  validator:
    build:
      context: ../../
      dockerfile: docker/node/Dockerfile
    container_name: misaka-validator
    restart: unless-stopped
    ports:
      - "6692:6690"
      - "3003:3001"
    volumes:
      - ./config:/config:ro
      - validator-data:/home/misaka/data
    environment:
      - MISAKA_NODE_NAME=validator-01
      - MISAKA_NODE_DATA_DIR=/home/misaka/data
      - MISAKA_NODE_ADVERTISE_ADDR=${VALIDATOR_ADVERTISE_ADDR:-}
      - MISAKA_NODE_SEEDS=${SEED_ADDRS:-49.212.136.189:6690}
      - MISAKA_NODE_VALIDATOR_INDEX=${VALIDATOR_INDEX:-0}
      - MISAKA_NODE_VALIDATOR_COUNT=${VALIDATOR_COUNT:-1}
      - MISAKA_NODE_BLOCK_TIME_SECS=${BLOCK_TIME:-60}
      - MISAKA_NODE_VALIDATOR=true
    command: ["--config", "/config/validator-node.toml"]

volumes:
  seed-data:
  public-data:
  validator-data:
