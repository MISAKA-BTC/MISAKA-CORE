[package]
name = "misaka-mempool"
description = "UTXO mempool with full PQ verification"
version.workspace = true
edition.workspace = true
license.workspace = true
[dependencies]
misaka-types = { path = "../misaka-types" }
misaka-crypto = { path = "../misaka-crypto" }
misaka-pqc = { path = "../misaka-pqc" }
misaka-storage = { path = "../misaka-storage" }
hex = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
parking_lot = { workspace = true }

[features]
default = ["custom-pq-main"]
custom-pq-main = []
legacy-tx-fallback = []
strict-pq-verify = []
chipmunk = ["misaka-pqc/chipmunk"]
stark-stub = ["misaka-pqc/stark-stub"]

[lints]
workspace = true
