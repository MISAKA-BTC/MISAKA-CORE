[package]
name = "misaka-mempool"
description = "UTXO mempool with key_image double-spend prevention"
version.workspace = true
edition.workspace = true
license.workspace = true
[dependencies]
misaka-types = { path = "../misaka-types" }
misaka-crypto = { path = "../misaka-crypto" }
misaka-storage = { path = "../misaka-storage" }
borsh = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true, optional = true }

[features]
default = ["custom-pq-main"]
custom-pq-main = []
legacy-tx-fallback = []
strict-pq-verify = []
dag = ["dep:tokio"]

[lints]
workspace = true
