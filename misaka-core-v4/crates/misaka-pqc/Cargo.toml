[package]
name = "misaka-pqc"
description = "Post-quantum crypto: ML-DSA-65 signing, ML-KEM-768 key encapsulation"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# Mainnet default: ONLY FIPS-standard primitives (ML-DSA, ML-KEM).
# No experimental code compiles in default builds.
default = []

[dependencies]
misaka-types = { path = "../misaka-types" }
pqcrypto-mldsa = { workspace = true }
pqcrypto-mlkem = { workspace = true }
pqcrypto-traits = { workspace = true }
sha3 = { workspace = true }
hkdf = { workspace = true }
rand = { workspace = true }
thiserror = { workspace = true }
hex = { workspace = true }
serde = { workspace = true }
serde_with = { workspace = true }
zeroize = { workspace = true }
blake3 = { workspace = true }

[dev-dependencies]
misaka-mempool = { path = "../misaka-mempool" }
misaka-storage = { path = "../misaka-storage" }
misaka-consensus = { path = "../misaka-consensus" }
misaka-dag = { path = "../misaka-dag" }

[lints]
workspace = true
