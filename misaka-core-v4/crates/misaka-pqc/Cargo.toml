[package]
name = "misaka-pqc"
description = "Post-quantum crypto: ML-DSA-65, ML-KEM-768, BDLOP commitments, UnifiedZKP"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# Mainnet default: ONLY FIPS-standard primitives (ML-DSA, ML-KEM) + production ZKP.
# No experimental code compiles in default builds.
default = []

# ── Production Features ──
# Stealth v2 (ML-KEM-768 based confidential outputs).
stealth-v2 = []

# ── Experimental / Testing Features ──
# STARK stub — NOT a real proof system. For API/integration testing only.
# MUST NOT be enabled in production builds.
stark-stub = []

# Legacy stealth v1 (pq_stealth.rs) — deprecated, for migration only.
legacy-stealth = []

# Placeholder feature so dependent crates can gate chipmunk-specific code
# without breaking dependency resolution when the implementation is absent.
chipmunk = []

# Experimental privacy research (independent of mainnet ZKP).
experimental-privacy = ["stark-stub"]

[dependencies]
misaka-types = { path = "../misaka-types" }
pqcrypto-dilithium = { workspace = true }
pqcrypto-kyber = { workspace = true }
pqcrypto-traits = { workspace = true }
sha3 = { workspace = true }
hkdf = { workspace = true }
chacha20poly1305 = { workspace = true }
rand = { workspace = true }
rand_core = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }
secrecy = { workspace = true }
hex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_with = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
misaka-mempool = { path = "../misaka-mempool" }
misaka-storage = { path = "../misaka-storage" }
misaka-consensus = { path = "../misaka-consensus" }
misaka-dag = { path = "../misaka-dag" }

[lints]
workspace = true
