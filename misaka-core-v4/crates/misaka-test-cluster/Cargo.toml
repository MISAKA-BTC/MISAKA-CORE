[package]
name = "misaka-test-cluster"
description = "MISAKA test cluster — programmatic multi-validator consensus testing"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
misaka-dag = { path = "../misaka-dag", features = ["rocksdb", "test-utils"] }
misaka-types = { path = "../misaka-types" }
misaka-protocol-config = { path = "../misaka-protocol-config" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
tempfile = "3"
rand = { workspace = true }

[lints.clippy]
unwrap_used = "allow"   # test-only crate — panics are acceptable
expect_used = "allow"
