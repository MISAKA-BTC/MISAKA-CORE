[features]
seeds = false
skip-lint = false

[programs.devnet]
misaka_bridge = "MBRDGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Deploy steps:
# 1. solana config set --url devnet
# 2. anchor build
# 3. anchor deploy
# 4. Copy program ID to [programs.devnet] and lib.rs declare_id!
