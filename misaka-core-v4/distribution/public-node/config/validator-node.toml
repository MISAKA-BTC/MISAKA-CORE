# MISAKA Network — Validator Node
# バリデータとしてブロック生成に参加する場合の設定。
#
# 前提:
#   1. misakastake.com でステーキング完了
#   2. --stake-signature でSolana TX署名を渡すか MISAKA_STAKE_SIGNATURE 環境変数をセット
#   3. --genesis-path で genesis_committee.toml を指定

[chain]
chain_id = 2
chain_name = "MISAKA Testnet"

[node]
mode = "public"
data_dir = "./misaka-data"
log_level = "info"

[p2p]
port = 6690
max_inbound_peers = 64
max_outbound_peers = 16
# advertise_addr = "YOUR_PUBLIC_IP:6690"

[rpc]
port = 3001

[consensus]
fast_block_time_secs = 2

[faucet]
enabled = true
amount = 1000000000
cooldown_secs = 300
