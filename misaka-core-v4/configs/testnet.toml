# MISAKA Network — Testnet Configuration
# chain_id = 2, LogRing-v1 default, LRS legacy, bridge disabled

[chain]
chain_id = 2
chain_name = "MISAKA Testnet"

[node]
mode = "public"
data_dir = "./misaka-data"
log_level = "info"

[p2p]
port = 6690
max_inbound_peers = 32
max_outbound_peers = 8
# advertise_addr = "YOUR_PUBLIC_IP:6690"

# SEC-P2P-GUARD: Connection guard settings (v3 defaults)
# Per-IP handshake attempts allowed per 60s window
max_handshake_attempts_per_ip = 5
# Maximum concurrent half-open (handshake in progress) connections
max_half_open = 64
# Half-open timeout before slot is reclaimed (seconds)
half_open_timeout_secs = 15
# Maximum established inbound connections from same /24 subnet
max_inbound_per_subnet = 4
# Maximum established inbound connections from same IP
max_inbound_per_ip = 2

# SEC-ST-LIFE: Session lifetime (seconds)
# Validator nodes SHOULD use 14400 (4 hours) for tighter key rotation
max_session_lifetime_secs = 86400

# Protocol version (v3 required — v2 nodes will be rejected)
min_protocol_version = 3

[rpc]
port = 3001

[consensus]
fast_block_time_secs = 2
zkp_block_time_secs = 30

[faucet]
enabled = true
# 1 MISAKA = 1_000_000_000 (9 decimals)
amount = 1000000000
cooldown_secs = 300

[ring_signature]
# LogRing-v1 is the SYSTEM DEFAULT ring signature scheme.
# O(log n) size — supports rings up to 1024 members.
# LRS-v1 remains available as legacy for backwards compatibility.
default_scheme = "logring-v1"
min_ring_size = 1  # v10: ring sigs purged
max_ring_size = 1024

[bridge]
enabled = false


# ─── Shielded Module ────────────────────────────────────────────────────────
# REMOVED: Shielded transfers have been deprecated.
# Reason: Groth16/PLONK depend on BLS12-381 pairings (Shor-vulnerable).
# SHA3 backend is PQ-safe but not zero-knowledge.
# MISAKA v1.0 operates in transparent-only mode.
# See docs/whitepaper_errata.md for details.
