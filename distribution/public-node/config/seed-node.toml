# MISAKA Network — Seed Node
# 他ノードのブートストラップ先として動作するシードノード設定。
# port 6690 を外部から到達可能にしてください。

[chain]
chain_id = 2
chain_name = "MISAKA Testnet"

[node]
mode = "seed"
data_dir = "./misaka-data"
log_level = "info"

[p2p]
port = 6690
max_inbound_peers = 128
max_outbound_peers = 16

[rpc]
port = 3001

[consensus]
fast_block_time_secs = 2

[faucet]
enabled = false
