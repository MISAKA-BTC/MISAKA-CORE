# MISAKA Bridge Relayer — Multi-instance Docker Compose
#
# Both relayers share the same processed-message store via volume.
# Idempotency keys ensure no duplicate submissions even with concurrent execution.
#
# Usage:
#   ../scripts/relayer-bootstrap.sh
#   docker compose -f docker-compose.yml up -d --build
#   docker compose -f docker-compose.yml logs -f
#   docker compose -f docker-compose.yml down

services:
  relayer-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misaka-relayer-1
    restart: unless-stopped
    env_file:
      - ../scripts/relayer.env
    environment:
      POLL_INTERVAL: 15
      PROCESSED_STORE: /data/relayer-processed.json
      RUST_LOG: info
    volumes:
      - relayer-data:/data
      - ./keys:/keys:ro

  relayer-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misaka-relayer-2
    restart: unless-stopped
    env_file:
      - ../scripts/relayer.env
    environment:
      POLL_INTERVAL: 20
      PROCESSED_STORE: /data/relayer-processed.json
      RUST_LOG: info
    volumes:
      - relayer-data:/data
      - ./keys:/keys:ro

volumes:
  relayer-data:
    driver: local
